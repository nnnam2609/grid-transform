# Local default configuration for the CV2 annotation-to-grid-transform app.
# CLI flags still override anything defined here.
#
# Relative paths are resolved from the folder that contains this file.

cv2_annotation_to_grid_transform:
  defaults:
    # Curated manifest used by Step 0 speaker selection.
    manifest_csv: VTLN/data/selection_manifest.csv

    # Root of the encoded ArtSpeech dataset.
    artspeech_root: ../Data/Artspeech_database

    # Canonical note used to resolve raw/VTLN speaker-session aliases.
    mapping_doc: docs/ARTSPEECH_MAPPING.md

    # Where latest-only workspace files are written.
    workspace_root: outputs/annotation_to_grid_transform

    # Default VTLN folder used by Step 0 when target mode is VTLN.
    vtln_dir: VTLN/data

    # Default nnUNet target shown in Step 0.
    # Must be a positive integer.
    default_target_case: "2008-003^01-1791/test"
    default_target_frame: 143020

    # Landmarks disabled in the Step 2 review/warp pipeline.
    # Disabled landmarks are hidden from the UI and excluded from affine/TPS fitting.
    disabled_landmarks: ["I6", "I7"]

    # Extra smoothing passes applied to the warped top axis in Step 2.
    # 0 disables the additional top-axis smoothing.
    top_axis_smoothing_passes: 4

    # Background export defaults for Step 3.
    # render_workers: integer in [1, 64]
    # render_prefetch: integer in [0, 1024]
    render_workers: 8
    render_prefetch: 0

    # Cache behavior.
    # startup    -> prewarm current selection from Step 0
    # first-load -> only load/cache when a selection is opened the first time
    cache_mode: startup

    # Initial cv2 window behavior.
    # full-height -> fit vertically while keeping aspect ratio
    # fullscreen  -> full screen
    # fixed       -> legacy fixed-size window
    window_mode: full-height

  ui:
    # Step 1 editor layout.
    # editor_panel_width / editor_panel_height: integers in [240, 4096]
    # editor_sidebar_width: integer in [160, 2048]
    # editor_footer_height: integer in [48, 2048]
    # editor_loupe_size: integer in [96, 1024]
    editor_panel_width: 960
    editor_panel_height: 960
    editor_sidebar_width: 320
    editor_footer_height: 88
    editor_loupe_size: 240

    # Step 2 review layout.
    # review_pane_width / review_pane_height: integers in [240, 4096]
    # pane_gap: integer in [0, 256]
    # review_footer_height: integer in [48, 2048]
    review_pane_width: 480
    review_pane_height: 340
    pane_gap: 12
    review_footer_height: 208

slide_p7_nnunet_exports:
  palette:
    source_grid: "#35c9ff"
    target_grid: "#ffd166"
    connector: "#f8fafc"
    target_landmark: "#e5e7eb"
    affine_anchor: "#fb8500"
    tps_extra: "#80ed99"
    other_landmark: "#ffd166"
    rmse_text: "#f8fafc"

  grid_build_landmarks:
    font_size: 9.2
    marker_edge_width: 1.2
    default_offset: [10.0, -10.0]
    point_offsets:
      I1: [-18.0, -8.0]
      I2: [-12.0, -10.0]
      I3: [0.0, -12.0]
      I4: [8.0, -10.0]
      I5: [10.0, -2.0]
      I6: [10.0, 6.0]
      I7: [10.0, -6.0]
      P1: [10.0, 10.0]
      M1: [10.0, -8.0]
      L6: [10.0, 10.0]
      L3: [-12.0, 2.0]
      L4: [-12.0, 2.0]
      L5: [-12.0, 2.0]
    point_sizes:
      default: 62.0
      P1: 78.0
      L6: 72.0
      L3: 54.0
      L4: 54.0
      L5: 54.0

  step2_native:
    marker_radius: 3
    marker_highlight_radius: 4
    label_font_scale: 0.45
    label_thickness: 1
    default_label_offset: [8, -8]
    label_positions:
      source_native: {}
      target_native: {}
    label_offsets:
      source_native: {}
      target_native: {}

  transform_sequence:
    connector_alpha: 0.22
    connector_thickness: 1
    grid_thickness_outer: 3
    grid_thickness_inner: 1
    target_marker_radius: 3
    source_marker_radius: 3
    show_labels: true
    label_font_scale: 0.42
    label_thickness: 1
    default_label_offset: [7, -7]
    label_positions:
      raw_overlay: {}
      affine_overlay: {}
      tps_overlay: {}
      affine_source_only: {}
      tps_source_only: {}
    label_offsets:
      raw_overlay: {}
      affine_overlay: {}
      tps_overlay: {}
      affine_source_only: {}
      tps_source_only: {}
